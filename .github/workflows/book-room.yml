name: Book Library Room

on:
  schedule:
    - cron: '59 14 * * *'   # 8:59 AM Calgary (UTC-6 → 14:59 UTC)
    - cron: '0 15 * * *'    # 9:00 AM
    - cron: '1 15 * * *'    # 9:01 AM

  workflow_dispatch:  # allows manual run

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          DATE: ${{ secrets.DATE }}
          LOCATION_ID: ${{ secrets.LOCATION_ID }}
          GROUP_SIZE: ${{ secrets.GROUP_SIZE }}
          MEETING_TITLE: ${{ secrets.MEETING_TITLE }}
          NAME: ${{ secrets.NAME }}
          EMAIL: ${{ secrets.EMAIL }}
          PHONE: ${{ secrets.PHONE }}
          PIN: ${{ secrets.PIN }}
          PREFERRED_TIME: ${{ secrets.PREFERRED_TIME }}
        run: python bot.py